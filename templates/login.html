<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Magic Movies</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-name">🎬 Magic Movies</div>
      <div class="auth-logo-tag">Book · Watch · Experience</div>
    </div>

    {% if signup_done %}
    <div class="alert alert-success">🎉 Welcome to Magic Movies, {{ user_name }}! Please sign in.</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
    {% endif %}

    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to book your tickets</p>

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" value="{{ user_email }}" placeholder="john@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Your password" required>
      </div>
      <div style="display:flex;justify-content:flex-end;margin:-6px 0 18px;">
        <a href="#" style="color:var(--text3);font-size:12px;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-red btn-full">Sign In →</button>
    </form>

    <div class="divider">new here?</div>
    <a href="/signup" class="btn btn-outline btn-full">Create Account</a>

  </div>
</div>
</body>
</html>
